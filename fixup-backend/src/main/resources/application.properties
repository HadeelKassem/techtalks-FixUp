spring.application.name=fixup-backend

# ================= DATABASE =================
spring.datasource.url=jdbc:postgresql://localhost:5432/fixup_db
spring.datasource.username=postgres
spring.datasource.password=fixup
spring.datasource.driver-class-name=org.postgresql.Driver

# ================= JPA =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================= SERVER =================
server.port=8080

# ================= INIT DATA =================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ================= JWT (FROM AUTH BRANCH) =================
jwt.secret=MySecretKeyForAuthenticationProject123456789
jwt.expiration=86400000